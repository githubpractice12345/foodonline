										</form>
										
									</li>
								</ul>

							<div class="login-option d-flex align-items-center" style="flex-wrap: nowrap !important;">
								{% if user.is_authenticated %}
								<a href="{% url 'cart' %}" class="cart-icon" ><i class="fa fa-shopping-cart text-danger" style="font-size: 20px;"></i>
									<span id="cart-count" class="badge badge-warning" style="border-radius: 50px; position: relative; bottom: 10px; left: -5px;">{{ cart_count }}</span>
								</a>
								{% endif %}
    							<a href="{% url 'marketplace' %}" class="btn btn-outline-danger text-uppercase font-weight-bold mx-2">Marketplace</a>
    							{% if user.is_authenticated %}
        						<a href="{% url 'myAccount' %}" class="mx-2" style="text-decoration: none; color: inherit; white-space: nowrap;">My Account</a>
        						<a href="{% url 'logout' %}" class="mx-2 text-danger" style="text-decoration: none; white-space: nowrap;">Logout</a>
    							{% else %}
        						<a href="{% url 'login' %}" class="mx-1" style="text-decoration: none; color: inherit; white-space: nowrap;">Login</a>
        						<span class="mx-1 text-muted" style="white-space: nowrap;">/</span>
        						<a href="{% url 'registerUser' %}" class="mx-2" style="text-decoration: none; color: inherit; white-space: nowrap;">Register</a>
        						<a href="{% url 'registerVendor' %}" class="btn btn-danger mx-2 px-3" style="white-space: nowrap;">Register Restaurant</a>

						</div>
