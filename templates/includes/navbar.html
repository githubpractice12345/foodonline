<script>
const x = document.getElementById("location");
var current_location = sessionStorage.getItem("current_location")
if(current_location !=""){
	x.value = current_location;
}

function getLocation() {
	// alert('test');
	// return false;
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(success, error);
  } else { 
    x.innerHTML = "Geolocation is not supported by this browser.";
  }
}

function success(position) {
	// console.log(position);
	var lat = position.coords.latitude
	var lng = position.coords.longitude

	//x.value = lat+','+lng  //In real we don't need lat,lng in input field,just for test purpose
  //x.innerHTML = "Latitude: " + position.coords.latitude + 
  //"<br>Longitude: " + position.coords.longitude;


  //hit AJAX request to googlemaps API end point and get the location data using those lat and lng
	var GOOGLE_API_KEY = "{{GOOGLE_API_KEY}}"    //from the context processor accessible to all template, C:\Users\hp\Desktop\FoodOnline\accounts\context_processors.py

	var url = "https://maps.googleapis.com/maps/api/geocode/json?latlng="+lat+","+lng+"+&key="+GOOGLE_API_KEY;
	// console.log(url); //when we select the location ,we see api end point on console .On click on that link we see json data of location.

	//ajax request
	$.ajax({
		url: url,
		type: "GET",
		success: function(response){
			// console.log(response); //On console we see results that contains no. of arrays with index number and that contains formatted_address which is the address of corresponding lat lng.
			
			//fetch the address 
			var current_location= response.results[0].formatted_address
			// console.log(current_location) // It show actual address, use console to debug your code for perfect use.
			x.value = current_location
			sessionStorage.setItem("current_location", current_location)
			window.location = '?lat='+lat+'&lng='+lng
		}

	}) 
}


function error() {
  alert("Sorry, no position available.");
}
</script>
